# fly.toml app configuration file generated for nailsco-backend on 2026-01-28T14:46:36-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nailsco-backend'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3001'
  AXIOM_DATASET = 'nailsco-logs'
  ALLOWED_ORIGINS = 'http://localhost:3000,http://localhost:3001,http://localhost:3002,https://nailsco-frontend.fly.dev,https://backoffice-web-so8xwa.fly.dev,https://frontend-web-wt6y.onrender.com'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
