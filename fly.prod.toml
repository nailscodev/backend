# fly.prod.toml - Nails & Beauty Co Backend (PRODUCTION)
# Deploy with: flyctl deploy --local-only --strategy=immediate --config fly.prod.toml

app = 'nailsco-backend-prod'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3001'
  AXIOM_DATASET = 'nailsco-prod-logs'
  ALLOWED_ORIGINS = 'https://nailsco-frontend-prod.fly.dev,https://nailsco-backoffice-prod.fly.dev'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
