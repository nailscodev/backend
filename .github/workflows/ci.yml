name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Sync lock file
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || echo "ESLint completed with warnings"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Sync lock file
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- --passWithNoTests
        env:
          NODE_ENV: test

  e2e-tests:
    name: E2E Booking Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: nails_and_beauty_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Sync lock file
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL (deep check)
        run: |
          echo "Waiting for PostgreSQL to accept connections..."
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U testuser -q; then
              if PGPASSWORD=testpass psql -h localhost -U testuser -d nails_and_beauty_test -c "SELECT 1" -q > /dev/null 2>&1; then
                echo "✅ PostgreSQL is ready (attempt $i)"
                exit 0
              fi
            fi
            echo "Attempt $i/30 — waiting 2s..."
            sleep 2
          done
          echo "❌ PostgreSQL did not become ready in time"
          exit 1

      - name: Seed test data
        run: |
          echo "Creating tables..."
          PGPASSWORD=testpass psql -h localhost -U testuser -d nails_and_beauty_test -f ./database/create-tables.sql
          echo "Loading sample data..."
          PGPASSWORD=testpass psql -h localhost -U testuser -d nails_and_beauty_test -f ./database/load-sample-data.sql
          echo "✅ Seed complete"

      - name: Run E2E tests
        id: e2e
        run: npm run test:e2e -- --testPathPatterns=booking --forceExit --testRetries=2
        timeout-minutes: 7
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://testuser:testpass@localhost:5432/nails_and_beauty_test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: testuser
          DB_PASSWORD: testpass
          DB_DATABASE: nails_and_beauty_test
          JWT_SECRET: test-jwt-secret-key-for-ci
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-for-ci
          CORS_ORIGINS: http://localhost:3000

      - name: Upload E2E test results on failure
        if: failure() && steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-logs-${{ github.run_number }}
          path: |
            test-results/
            *.log
          retention-days: 7
          if-no-files-found: ignore

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Sync lock file
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Fly.io
    needs: [lint, unit-tests, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run deploy
        run: flyctl deploy --local-only --strategy=immediate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  performance-tests:
    name: Performance Tests (All)
    needs: [deploy]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true  # Never block pipeline — informational only
    permissions:
      contents: write  # Required to post commit comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Wait for deployment to be ready
        run: |
          echo "Waiting 30s for Fly.io deployment to stabilize..."
          sleep 30
          echo "Checking backend health..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_PROD_URL || 'https://nailsco-backend.fly.dev' }}/api/v1/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/10 — status $STATUS, waiting 10s..."
            sleep 10
          done
          echo "⚠️ Backend health check timed out — running tests anyway"

      - name: Create reports directory
        run: mkdir -p k6-reports

      # ── 1. Load Test (~50s) ──────────────────────────────────────────────
      - name: Run Load Test
        id: load
        env:
          K6_WEB_DASHBOARD: "true"
          K6_WEB_DASHBOARD_OPEN: "false"
          K6_WEB_DASHBOARD_EXPORT: "../../k6-reports/load-report.html"
          K6_SUMMARY_TREND_STATS: "avg,min,med,max,p(90),p(95),p(99)"
        run: |
          cd tests/stress
          k6 run load-test.js \
            --env BASE_URL=${{ secrets.BACKEND_PROD_URL || 'https://nailsco-backend.fly.dev' }} \
            2>&1 | tee ../../k6-reports/load-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── 2. Stress Test (~60s) ────────────────────────────────────────────
      - name: Run Stress Test
        id: stress
        env:
          K6_WEB_DASHBOARD: "true"
          K6_WEB_DASHBOARD_OPEN: "false"
          K6_WEB_DASHBOARD_EXPORT: "../../k6-reports/stress-report.html"
          K6_SUMMARY_TREND_STATS: "avg,min,med,max,p(90),p(95),p(99)"
        run: |
          cd tests/stress
          k6 run stress-test.js \
            --env BASE_URL=${{ secrets.BACKEND_PROD_URL || 'https://nailsco-backend.fly.dev' }} \
            2>&1 | tee ../../k6-reports/stress-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── 3. Spike Test (~40s) ─────────────────────────────────────────────
      - name: Run Spike Test
        id: spike
        env:
          K6_WEB_DASHBOARD: "true"
          K6_WEB_DASHBOARD_OPEN: "false"
          K6_WEB_DASHBOARD_EXPORT: "../../k6-reports/spike-report.html"
          K6_SUMMARY_TREND_STATS: "avg,min,med,max,p(90),p(95),p(99)"
        run: |
          cd tests/stress
          k6 run spike-test.js \
            --env BASE_URL=${{ secrets.BACKEND_PROD_URL || 'https://nailsco-backend.fly.dev' }} \
            2>&1 | tee ../../k6-reports/spike-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── 4. Soak Test (~3min in CI via DURATION=2m) ───────────────────────
      - name: Run Soak Test
        id: soak
        env:
          K6_WEB_DASHBOARD: "true"
          K6_WEB_DASHBOARD_OPEN: "false"
          K6_WEB_DASHBOARD_EXPORT: "../../k6-reports/soak-report.html"
          K6_SUMMARY_TREND_STATS: "avg,min,med,max,p(90),p(95),p(99)"
        run: |
          cd tests/stress
          k6 run soak-test.js \
            --env BASE_URL=${{ secrets.BACKEND_PROD_URL || 'https://nailsco-backend.fly.dev' }} \
            --env DURATION=2m \
            2>&1 | tee ../../k6-reports/soak-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── Generate Step Summary + commit comment ───────────────────────────
      - name: Generate reports and post commit comment
        if: always()
        id: report
        run: |
          BASE_URL="${{ secrets.BACKEND_PROD_URL || 'https://nailsco-backend.fly.dev' }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          python3 << 'PYEOF'
          import json, os, sys

          def load(f):
            try:
              d = json.load(open(f))
              m = d.get('metrics', {})
              def v(key, sub): 
                node = m.get(key, {})
                direct = node.get(sub)
                if direct is not None: return direct
                return node.get('values', {}).get(sub)
              p95  = v('http_req_duration', 'p(95)')
              p99  = v('http_req_duration', 'p(99)')
              avg  = v('http_req_duration', 'avg')
              err  = v('error_rate',        'rate')
              rps  = v('http_reqs',         'rate')
              reqs = v('http_reqs',         'count')
              def ms(x): return f"{float(x):.0f}ms" if x is not None else "N/A"
              def pct(x): return f"{float(x)*100:.2f}%" if x is not None else "N/A"
              def rp(x): return f"{float(x):.1f}" if x is not None else "N/A"
              return {'p95': p95, 'p99': p99, 'avg': avg, 'err': err, 'rps': rps, 'reqs': reqs,
                      'ms_p95': ms(p95), 'ms_p99': ms(p99), 'ms_avg': ms(avg),
                      'pct_err': pct(err), 'rps_s': rp(rps), 'count': str(int(float(reqs))) if reqs else 'N/A'}
            except Exception as e:
              return {'ms_p95':'N/A','ms_p99':'N/A','ms_avg':'N/A','pct_err':'N/A','rps_s':'N/A','count':'N/A',
                      'p95':None,'err':None}

          tests = [
            ('Load',   'k6-reports/load-summary.json',   800,  0.01,  '10 VUs · 50s',     'load-report.html'),
            ('Stress', 'k6-reports/stress-summary.json', 5000, 0.20,  'up to 50 VUs · 60s','stress-report.html'),
            ('Spike',  'k6-reports/spike-summary.json',  10000,0.30,  '2→50→2 VUs · 40s', 'spike-report.html'),
            ('Soak',   'k6-reports/soak-summary.json',   1000, 0.01,  '10 VUs · 3min',    'soak-report.html'),
          ]

          rows_md = []
          rows_summary = []
          all_pass = True

          for name, f, p95_thresh, err_thresh, profile, html_file in tests:
            d = load(f)
            p95_ok = (d['p95'] is not None and float(d['p95']) < p95_thresh)
            err_ok = (d['err'] is not None and float(d['err']) < err_thresh)
            ok = p95_ok and err_ok
            if not ok: all_pass = False
            badge = "✅" if ok else "⚠️"
            p95_cell = f"**{d['ms_p95']}**" + ("" if p95_ok else " ⚠️")
            err_cell  = d['pct_err'] + ("" if err_ok  else " ⚠️")
            rows_md.append(f"| {badge} {name} | {profile} | {d['ms_avg']} | {p95_cell} | {d['ms_p99']} | {err_cell} | {d['rps_s']} req/s | {d['count']} |")
            rows_summary.append((name, badge, d, p95_ok, err_ok, html_file))

          overall = "✅ All tests passed" if all_pass else "⚠️ Some thresholds exceeded"
          
          run_url = os.environ.get('RUN_URL', '')
          short_sha = os.environ.get('SHORT_SHA', '')
          artifact_num = os.environ.get('RUN_NUMBER', '')

          table = "\n".join(rows_md)

          # ── GitHub Step Summary ──────────────────────────────────────────
          summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
          with open(summary_file, 'a') as f:
            f.write(f"""## 🚀 k6 Performance Report — {overall}

          > Commit `{short_sha}` · [View full run]({run_url})

          | | Test | Profile | Avg | p95 | p99 | Error Rate | RPS | Requests |
          |--|------|---------|-----|-----|-----|------------|-----|----------|
          {table}

          **Thresholds:** Load p95<800ms err<1% · Stress p95<5s err<20% · Spike p95<10s err<30% · Soak p95<1s err<1%

          > 📦 Artifact **k6-performance-reports-{artifact_num}**: contains `load/stress/spike/soak-report.html` (open in browser for interactive charts)
          """)

          # ── Commit comment (markdown) ────────────────────────────────────
          comment = f"""## 🚀 k6 Performance Tests — {overall}

          | | Test | Profile | Avg | p95 | p99 | Error Rate | RPS |
          |--|------|---------|-----|-----|-----|------------|-----|
          {table.replace(' | '+rows_md[0].split('|')[-2].strip()+' |', ' |') if rows_md else table}

          <details>
          <summary>Thresholds reference</summary>

          | Test | p95 limit | Error limit |
          |------|-----------|-------------|
          | Load | < 800ms | < 1% |
          | Stress | < 5000ms | < 20% |
          | Spike | < 10000ms | < 30% |
          | Soak | < 1000ms | < 1% |

          </details>

          > 🔗 [Full run + HTML reports (artifact)]({run_url}) · Commit `{short_sha}`
          """
          with open('k6-reports/comment.md', 'w') as f:
            f.write(comment)

          # ── HTML email body ──────────────────────────────────────────────
          def row_color(ok): return '#d4edda' if ok else '#fff3cd'
          def badge_html(ok): return '<span style="color:#155724;font-weight:700">✅ PASS</span>' if ok else '<span style="color:#856404;font-weight:700">⚠️ WARN</span>'

          html_rows = ''
          for name, f, p95_thresh, err_thresh, profile, _ in tests:
            d = load(f)
            p95_ok = (d['p95'] is not None and float(d['p95']) < p95_thresh)
            err_ok = (d['err'] is not None and float(d['err']) < err_thresh)
            ok = p95_ok and err_ok
            bg = row_color(ok)
            p95_style = '' if p95_ok else 'color:#856404;font-weight:700'
            err_style  = '' if err_ok  else 'color:#856404;font-weight:700'
            html_rows += f'''
              <tr style="background:{bg}">
                <td style="padding:10px 14px;border-bottom:1px solid #dee2e6">{badge_html(ok)}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #dee2e6;font-weight:600">{name}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #dee2e6;color:#555">{profile}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #dee2e6">{d["ms_avg"]}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #dee2e6;{p95_style}">{d["ms_p95"]}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #dee2e6">{d["ms_p99"]}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #dee2e6;{err_style}">{d["pct_err"]}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #dee2e6">{d["rps_s"]} req/s</td>
                <td style="padding:10px 14px;border-bottom:1px solid #dee2e6">{d["count"]}</td>
              </tr>'''

          overall_color = '#155724' if all_pass else '#856404'
          overall_bg    = '#d4edda' if all_pass else '#fff3cd'
          overall_border= '#c3e6cb' if all_pass else '#ffeeba'
          overall_icon  = '✅' if all_pass else '⚠️'

          email_html = f"""<!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"/></head>
          <body style="font-family:Arial,sans-serif;background:#f8f9fa;padding:24px;margin:0">
            <div style="max-width:820px;margin:0 auto;background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)">
              <!-- Header -->
              <div style="background:#1a1a1a;padding:20px 28px;color:white">
                <h1 style="margin:0;font-size:20px;letter-spacing:1px">🚀 k6 Performance Tests</h1>
                <p style="margin:6px 0 0;color:#aaa;font-size:13px">Nails &amp; Co. Backend · Commit <code style="color:#ddd">{short_sha}</code></p>
              </div>
              <!-- Overall status -->
              <div style="background:{overall_bg};border:1px solid {overall_border};margin:20px;border-radius:6px;padding:14px 18px">
                <strong style="color:{overall_color};font-size:15px">{overall_icon} {overall}</strong>
              </div>
              <!-- Results table -->
              <div style="padding:0 20px 20px">
                <table style="width:100%;border-collapse:collapse;font-size:13px">
                  <thead>
                    <tr style="background:#f1f3f5">
                      <th style="padding:10px 14px;text-align:left;border-bottom:2px solid #dee2e6"></th>
                      <th style="padding:10px 14px;text-align:left;border-bottom:2px solid #dee2e6">Test</th>
                      <th style="padding:10px 14px;text-align:left;border-bottom:2px solid #dee2e6">Profile</th>
                      <th style="padding:10px 14px;text-align:left;border-bottom:2px solid #dee2e6">Avg</th>
                      <th style="padding:10px 14px;text-align:left;border-bottom:2px solid #dee2e6">p95</th>
                      <th style="padding:10px 14px;text-align:left;border-bottom:2px solid #dee2e6">p99</th>
                      <th style="padding:10px 14px;text-align:left;border-bottom:2px solid #dee2e6">Error Rate</th>
                      <th style="padding:10px 14px;text-align:left;border-bottom:2px solid #dee2e6">RPS</th>
                      <th style="padding:10px 14px;text-align:left;border-bottom:2px solid #dee2e6">Requests</th>
                    </tr>
                  </thead>
                  <tbody>{html_rows}</tbody>
                </table>
              </div>
              <!-- Thresholds -->
              <div style="background:#f8f9fa;padding:14px 20px;border-top:1px solid #dee2e6;font-size:12px;color:#666">
                <strong>Thresholds:</strong>
                Load p95&lt;800ms err&lt;1% &nbsp;·&nbsp;
                Stress p95&lt;5s err&lt;20% &nbsp;·&nbsp;
                Spike p95&lt;10s err&lt;30% &nbsp;·&nbsp;
                Soak p95&lt;1s err&lt;1%
              </div>
              <!-- Footer -->
              <div style="padding:16px 20px;font-size:12px;color:#888;border-top:1px solid #eee">
                <a href="{run_url}" style="color:#1a1a1a">View full run &amp; HTML reports →</a>
                &nbsp;·&nbsp; Run #{artifact_num} on <code>main</code>
              </div>
            </div>
          </body>
          </html>"""

          with open('k6-reports/email.html', 'w') as f:
            f.write(email_html)

          print("Report generated OK")
          sys.exit(0)
          PYEOF

          # Export vars for the python heredoc
        env:
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHORT_SHA: "${{ github.sha }}"
          RUN_NUMBER: "${{ github.run_number }}"

      # ── Post results as a commit comment ─────────────────────────────────
      - name: Post commit comment with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('k6-reports/comment.md', 'utf8');
            } catch (e) {
              body = '⚠️ k6 performance tests ran but report generation failed. Check the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).';
            }
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });

      # ── Upload HTML reports + summaries as artifact ───────────────────────
      - name: Upload k6 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-reports-${{ github.run_number }}
          path: |
            k6-reports/load-report.html
            k6-reports/stress-report.html
            k6-reports/spike-report.html
            k6-reports/soak-report.html
            k6-reports/email.html
            k6-reports/load-summary.json
            k6-reports/stress-summary.json
            k6-reports/spike-summary.json
            k6-reports/soak-summary.json
            k6-reports/load-output.txt
            k6-reports/stress-output.txt
            k6-reports/spike-output.txt
            k6-reports/soak-output.txt
          retention-days: 30
          if-no-files-found: ignore

      # ── Send email with results ───────────────────────────────────────────
      - name: Send results email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: nailscodev@gmail.com
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "🚀 k6 Performance Tests — ${{ github.repository }} #${{ github.run_number }}"
          to: ilan.daniele@gmail.com
          from: "Nails & Co. CI <nailscodev@gmail.com>"
          html_body: file://k6-reports/email.html
          ignore_cert: false
