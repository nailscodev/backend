name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || echo "ESLint completed with warnings"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- --passWithNoTests
        env:
          NODE_ENV: test

  e2e-tests:
    name: E2E Booking Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: nails_and_beauty_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL (deep check)
        run: |
          echo "Waiting for PostgreSQL to accept connections..."
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U testuser -q; then
              if PGPASSWORD=testpass psql -h localhost -U testuser -d nails_and_beauty_test -c "SELECT 1" -q > /dev/null 2>&1; then
                echo "✅ PostgreSQL is ready (attempt $i)"
                exit 0
              fi
            fi
            echo "Attempt $i/30 — waiting 2s..."
            sleep 2
          done
          echo "❌ PostgreSQL did not become ready in time"
          exit 1

      - name: Seed test data
        run: |
          echo "Creating tables..."
          PGPASSWORD=testpass psql -h localhost -U testuser -d nails_and_beauty_test -f ./database/create-tables.sql
          echo "Loading sample data..."
          PGPASSWORD=testpass psql -h localhost -U testuser -d nails_and_beauty_test -f ./database/load-sample-data.sql
          echo "✅ Seed complete"

      - name: Run E2E tests
        id: e2e
        run: npm run test:e2e -- --testPathPatterns=booking --forceExit --testRetries=2
        timeout-minutes: 7
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://testuser:testpass@localhost:5432/nails_and_beauty_test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: testuser
          DB_PASSWORD: testpass
          DB_DATABASE: nails_and_beauty_test
          JWT_SECRET: test-jwt-secret-key-for-ci
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-for-ci
          CORS_ORIGINS: http://localhost:3000

      - name: Upload E2E test results on failure
        if: failure() && steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-logs-${{ github.run_number }}
          path: |
            test-results/
            *.log
          retention-days: 7
          if-no-files-found: ignore

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Fly.io
    needs: [lint, unit-tests, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run deploy
        run: flyctl deploy --remote-only --strategy=immediate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  performance-tests:
    name: Performance Tests (All)
    needs: [deploy]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true  # Never block pipeline — informational only

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Wait for deployment to be ready
        run: |
          echo "Waiting 30s for Fly.io deployment to stabilize..."
          sleep 30
          echo "Checking backend health..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_PROD_URL || 'https://nailsco-backend.fly.dev' }}/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/10 — status $STATUS, waiting 10s..."
            sleep 10
          done
          echo "⚠️ Backend health check timed out — running tests anyway"

      - name: Create reports directory
        run: mkdir -p k6-reports

      # ── 1. Load Test (~50s) ──────────────────────────────────────────────
      - name: Run Load Test
        id: load
        run: |
          cd tests/stress
          k6 run load-test.js \
            --env BASE_URL=${{ secrets.BACKEND_PROD_URL || 'https://nailsco-backend.fly.dev' }} \
            --out json=../../k6-reports/load-results.json \
            --summary-export=../../k6-reports/load-summary.json \
            2>&1 | tee ../../k6-reports/load-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── 2. Stress Test (~60s) ────────────────────────────────────────────
      - name: Run Stress Test
        id: stress
        run: |
          cd tests/stress
          k6 run stress-test.js \
            --env BASE_URL=${{ secrets.BACKEND_PROD_URL || 'https://nailsco-backend.fly.dev' }} \
            --out json=../../k6-reports/stress-results.json \
            --summary-export=../../k6-reports/stress-summary.json \
            2>&1 | tee ../../k6-reports/stress-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── 3. Spike Test (~40s) ─────────────────────────────────────────────
      - name: Run Spike Test
        id: spike
        run: |
          cd tests/stress
          k6 run spike-test.js \
            --env BASE_URL=${{ secrets.BACKEND_PROD_URL || 'https://nailsco-backend.fly.dev' }} \
            --out json=../../k6-reports/spike-results.json \
            --summary-export=../../k6-reports/spike-summary.json \
            2>&1 | tee ../../k6-reports/spike-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── 4. Soak Test (~3min in CI via DURATION=2m) ───────────────────────
      - name: Run Soak Test
        id: soak
        run: |
          cd tests/stress
          k6 run soak-test.js \
            --env BASE_URL=${{ secrets.BACKEND_PROD_URL || 'https://nailsco-backend.fly.dev' }} \
            --env DURATION=2m \
            --out json=../../k6-reports/soak-results.json \
            --summary-export=../../k6-reports/soak-summary.json \
            2>&1 | tee ../../k6-reports/soak-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── Upload all reports as a single artifact ──────────────────────────
      - name: Upload k6 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-reports-${{ github.run_number }}
          path: k6-reports/
          retention-days: 30
          if-no-files-found: ignore

      # ── Build consolidated GitHub Step Summary ───────────────────────────
      - name: Generate consolidated report
        if: always()
        run: |
          extract() {
            local file="$1"
            local metric="$2"
            if [ -f "$file" ]; then
              python3 -c "
          import json, sys
          try:
            d = json.load(open('$file'))
            m = d.get('metrics', {})
            dur = m.get('http_req_duration', {})
            err = m.get('http_req_failed', {})
            reqs = m.get('http_reqs', {})
            p95  = dur.get('p(95)', dur.get('values', {}).get('p(95)', 'N/A'))
            p99  = dur.get('p(99)', dur.get('values', {}).get('p(99)', 'N/A'))
            avg  = dur.get('avg', dur.get('values', {}).get('avg', 'N/A'))
            rate = err.get('rate', err.get('values', {}).get('rate', 'N/A'))
            rps  = reqs.get('rate', reqs.get('values', {}).get('rate', 'N/A'))
            def fmt(v): return f'{float(v):.1f}' if v != 'N/A' else 'N/A'
            def fmtpct(v): return f'{float(v)*100:.2f}%' if v != 'N/A' else 'N/A'
            print(f'{fmt(avg)}ms | {fmt(p95)}ms | {fmt(p99)}ms | {fmtpct(rate)} | {fmt(rps)} req/s')
          except Exception as e:
            print('N/A | N/A | N/A | N/A | N/A')
          " 2>/dev/null || echo "N/A | N/A | N/A | N/A | N/A"
            else
              echo "N/A | N/A | N/A | N/A | N/A"
            fi
          }

          LOAD=$(extract  k6-reports/load-summary.json)
          STRESS=$(extract k6-reports/stress-summary.json)
          SPIKE=$(extract  k6-reports/spike-summary.json)
          SOAK=$(extract   k6-reports/soak-summary.json)

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 k6 Performance Tests — Run #${{ github.run_number }}

          > Commit \`${{ github.sha }}\` · Branch \`${{ github.ref_name }}\`

          | Test | Avg | p95 | p99 | Error Rate | RPS |
          |------|-----|-----|-----|------------|-----|
          | Load (~50s, 10 VUs) | $LOAD |
          | Stress (~60s, up to 50 VUs) | $STRESS |
          | Spike (~40s, 2→50→2 VUs) | $SPIKE |
          | Soak (~3min, 10 VUs steady) | $SOAK |

          ### Thresholds
          - **Load**: p95 < 800ms, error rate < 1%
          - **Stress**: p95 < 5000ms, error rate < 20%
          - **Spike**: p95 < 10000ms, error rate < 30%
          - **Soak**: p95 < 1000ms at all times, error rate < 1%

          > 📦 Full JSON reports available in artifact **k6-performance-reports-${{ github.run_number }}** (30-day retention)
          EOF

          echo ""
          echo "=== Load Test Output (last 20 lines) ==="
          tail -20 k6-reports/load-output.txt 2>/dev/null || echo "(no output)"
          echo ""
          echo "=== Stress Test Output (last 20 lines) ==="
          tail -20 k6-reports/stress-output.txt 2>/dev/null || echo "(no output)"
          echo ""
          echo "=== Spike Test Output (last 20 lines) ==="
          tail -20 k6-reports/spike-output.txt 2>/dev/null || echo "(no output)"
          echo ""
          echo "=== Soak Test Output (last 20 lines) ==="
          tail -20 k6-reports/soak-output.txt 2>/dev/null || echo "(no output)"
